{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gunners Pulse Login</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0"
    />
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
  </head>
  <body>
    <div class="card">
      <div class="logo-wrap">
        <img
          class="siteLogo"
          id="siteLogo"
          src="{% static 'images/white_gun.jpg' %}"
          alt="Gunners Pulse Logo"
          onerror="this.style.display = 'none'"
        />
      </div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Enter your credentials to access your account</p>
      {% if form.errors %}
      <div class="error-box" id="errorMsg" style="display: flex">
        <span
          class="material-symbols-outlined"
          style="font-size: 1.1rem"
        ></span>
        <span id="errorText"
          >Invalid username or password. Please try again.</span
        >
      </div>
      {% endif %}
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button class="toggle-btn" id="togglePassword" type="button">
              <span class="material-symbols-outlined" id="toggleIcon"
                >visibility</span
              >
            </button>
          </div>
        </div>
        <div class="forgot"><a href="javascript:void(0)" aria-disabled="true">Forgot your password?</a></div>
        <button class="btn-login" id="loginBtn" type="submit">Login</button>
      </form>
      <div class="footer">© Gunners Pulse 2026</div>
    </div>
    <script src="{% static 'js/login.js' %}"></script>
  </body>
</html>
